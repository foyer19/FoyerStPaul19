<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foyer St Paul 19</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; text-align: center; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* Sommaire */
        #sommaireDates { background: #fff3cd; border: 1px solid #ffeeba; padding: 15px; border-radius: 8px; margin: 20px auto; max-width: 500px; text-align: left; }
        #sommaireDates h2 { margin-top: 0; font-size: 1.2em; color: #856404; text-align: center; }
        #sommaireDates ul { list-style: none; padding: 0; margin: 0; }
        #sommaireDates li { margin-bottom: 5px; border-bottom: 1px dashed #decba1; padding-bottom: 5px; }

        /* Cartes & Jauges */
        #listeActivites { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 20px; }
        .card { width: 350px; background: white; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; position: relative; }
        .card img { width: 100%; height: auto; display: block; }
        .card-body { padding: 15px; }
        .badge-complet { position: absolute; top: 10px; left: 10px; background: red; color: white; padding: 5px 10px; font-weight: bold; border-radius: 5px; z-index: 10; }
        
        /* Barre de progression */
        .progress-bg { background: #eee; height: 12px; border-radius: 6px; margin: 10px 0; overflow: hidden; }
        .progress-bar { height: 100%; transition: width 0.5s; }

        /* Boutons de contact */
        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 15px; }
        .btn { padding: 12px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; color: white; display: flex; align-items: center; gap: 8px; }
        .btn-fb { background: #1877F2; } /* Bleu Facebook */
        .btn-tel { background: #28a745; } /* Vert Téléphone */

        /* Section Compte-Rendu */
        .compte-rendu { text-align: left; padding: 20px; line-height: 1.6; border-top: 2px solid #007bff; margin-top: 20px; }
        
        footer { margin-top: 50px; padding: 20px; border-top: 1px solid #ddd; color: #666; }
        .compteur-img { margin-top: 10px; max-width: 150px; height: auto; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Foyer St Paul Corrèze</h1>
        
        <div id="sommaireDates">
            <h2>📅 Calendrier 2026</h2>
            <ul id="listeDates"></ul>
        </div>

        <!-- BLOC DE CONTACT -->
        <div style="background: #f1f3f5; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
            <p style="margin-top:0; font-weight:bold;">📝 Réservations & Infos :</p>
            <div class="btn-group">
                <a href="https://www.facebook.com/TON_LIEN_FACEBOOK" target="_blank" class="btn btn-fb">Facebook du Foyer</a>
                <a href="tel:06XXXXXXXX" class="btn btn-tel">📞 Appeler pour réserver</a>
            </div>
        </div>

        <div id="listeActivites"></div>
    </div>

    <!-- SECTION COMPTE-RENDU -->
    <div class="container">
        <div class="compte-rendu">
            <h2>📜 Assemblée Générale 2025</h2>
            <p>Le compte-rendu de l'AG est disponible ici pour consultation...</p>
        </div>
    </div>

    <footer>
        <p>© <span id="annee"></span> Foyer St Paul 19</p>
        <div style="margin-bottom: 10px;">
            <img class="compteur-img" src="https://komarev.com/ghpvc/?username=foyer19-FoyerStPaul19&color=blue&style=flat&label=VISITES" alt="Compteur de visites">
        </div>
        <p style="font-size: 0.8em; opacity: 0.8;">Propulsé par GitHub Pages</p>
    </footer>

    <script>
        document.getElementById('annee').textContent = new Date().getFullYear();

        const mesActivites = [
            { titre: "Moules frites karaoké", date: "Samedi 15 Mars 2026", image: "moulesfrites.jpg", inscrits: 20, quota: 20 },
            { titre: "Aligot saucisse", date: "Dimanche 12 Avril 2026", image: "aligot.jpg", inscrits: 25, quota: 30 }
        ];

        const container = document.getElementById('listeActivites');
        const sommaire = document.getElementById('listeDates');

        if(container && sommaire) {
            container.innerHTML = ""; 
            sommaire.innerHTML = "";

            mesActivites.forEach(function(act) {
                sommaire.innerHTML += '<li><b>' + act.date + '</b> : ' + act.titre + '</li>';

                const pourcentage = Math.min((act.inscrits / act.quota) * 100, 100);
                let couleurJauge = "#28a745"; // Vert
                if (pourcentage > 70) couleurJauge = "#ffc107"; // Orange
                if (pourcentage >= 100) couleurJauge = "#dc3545"; // Rouge

                var badge = (act.inscrits >= act.quota) ? '<div class="badge-complet">COMPLET</div>' : '';
                
                var carte = '<div class="card">' +
                            badge +
                            '<img src="' + act.image + '" alt="' + act.titre + '">' +
                            '<div class="card-body">' +
                            '<h3>' + act.titre + '</h3>' +
                            '<p style="color:#d9534f; font-weight:bold; margin:0;">' + act.date + '</p>' +
                            '<div class="progress-bg"><div class="progress-bar" style="width:'+pourcentage+'%; background:'+couleurJauge+';"></div></div>' +
                            '<p style="margin:0; font-size:0.9em;">Places : ' + act.inscrits + ' / ' + act.quota + '</p>' +
                            '</div>' +
                            '</div>';
                container.innerHTML += carte;
            });
        }
    </script>
</body>
</html>
